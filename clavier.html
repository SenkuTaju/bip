<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yemi Music Box 🎹</title>
    <style>
        body { background-color: #2c3e50; color: white; font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        button { 
            display: block; width: 80%; max-width: 300px; margin: 10px auto; 
            padding: 15px; border: none; border-radius: 8px; 
            color: white; font-weight: bold; font-size: 16px; cursor: pointer;
        }
        .starwars { background: #f1c40f; color: black; }
        .hp { background: #9b59b6; }
        .pirates { background: #e67e22; }
        .r2d2 { background: #3498db; }
        .mi { background: #e74c3c; }
        .jaws { background: #34495e; }
        .indy { background: #d35400; }
    </style>
</head>
<body>
    <h1>🎹 YEMI MUSIC BOX</h1>
    <p>Clique pour la magie</p>

    <button class="starwars" onclick="playStarWars()">✨ Star Wars</button>
    <button class="hp" onclick="playHP()">⚡️ Harry Potter</button>
    <button class="pirates" onclick="playPirates()">🏴‍☠️ Pirates</button>
    <button class="r2d2" onclick="playR2D2()">🤖 R2-D2</button>
    <button class="mi" onclick="playMI()">💣 Mission Impossible</button>
    <button class="jaws" onclick="playJaws()">🦈 Les Dents de la Mer</button>
    <button class="indy" onclick="playIndy()">🤠 Indiana Jones</button>

    <script>
        const ctx = new (window.AudioContext || window.webkitAudioContext)();

        function beep(freq, duration) {
            if (ctx.state === 'suspended') ctx.resume();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'square'; // Le son "Bip" de ton Python
            osc.frequency.value = freq;
            osc.connect(gain);
            gain.connect(ctx.destination);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration/1000);
            osc.start();
            osc.stop(ctx.currentTime + duration/1000);
        }
        function playNotes(notes) {
                let time = 0;
                notes.forEach(([freq, duration]) => {
                setTimeout(() => beep(freq, duration), time);
                time += duration + 50; // +50ms de pause entre les notes
    });
}
       function playStarWars() {
            playNotes([[392, 400], [587, 400], [523, 150], [494, 150], [440, 150], [784, 400], [587, 300], [523, 150], [494, 150], [440, 150], [784, 400]]);
        }

        function playHP() {
            playNotes([[987, 400], [1318, 600], [1568, 200], [1480, 200], [1318, 400], [1975, 400], [1760, 600], [1480, 800]]);
        }

        function playPirates() {
            playNotes([[440, 150], [523, 150], [587, 300], [587, 300], [587, 150], [659, 150], [698, 300], [698, 300], [698, 150], [784, 150], [659, 300], [659, 300], [587, 150], [523, 150], [587, 450]]);
        }

        function playR2D2() {
            for(let i=0; i<10; i++) setTimeout(() => beep(Math.random()*2200 + 800, 100), i*120);
        }

        function playMI() {
            playNotes([[784, 150], [784, 150], [932, 150], [1046, 150],
        [784, 150], [784, 150], [698, 150], [740, 150]]);
        }

        function playJaws() {
            let speed = 500;
            for(let i=0; i<10; i++) {
                setTimeout(() => beep(330, 200), i * speed);
                speed *= 0.8;
            }
        }

        function playIndy() {
            playNotes([[659, 150], [698, 80], [784, 150], [1046, 500],
        [587, 150], [659, 80], [698, 400]]);
        }
    </script>
</body>
</html>
